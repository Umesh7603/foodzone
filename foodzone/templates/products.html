{%extends 'base.html'%}
{%block content%}
<div class="container">
    <div class="row">
        <div class="col">
            <h2 class="text-center mt-4">{{category_name}}</h2>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-3">
        {%for item in products%}
        <div class="col col-12 col-sm-6 col-md-3 col-lg-3 d-flex justify-content-center mb-5">
            <div class="card card_size ">
                <a href="{%url 'products_details' category_name item.name%}"><img class="img-fluid img_size" src="{{item.product_image.url}}" alt=""></a>
                <div class="card-body">
                    <a class="text-decoration-none text-dark text-center" href="{%url 'products_details' category_name item.name%}"><h3>{{item.name}}</h3></a>
                </div>
                <div class="card-text">
                    <h5 class="float-start"><s>Rs.{{item.original_price}}</s></h5>
                    <h5 class="float-end">Rs.{{item.selling_price}}</h5>
                </div>
            </div>
        </div>
        {%endfor%}
    </div>
</div>
{%endblock%}
