{%extends 'base.html'%}
{%block content%}
<div class="container">
    <div class="row">
        <div class="col">
            <h2 class="text-center mt-4 fw-bolder">MENU</h2>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-3">
        {%for item in category%}
        <div class="col col-12 col-sm-6 col-md-4 col-lg-4 d-flex justify-content-center mb-5">
            <div class="card card_size rounded-5">
                <a href="{%url 'menu' item.name %}"><img class="img-fluid img_size rounded-top-5" src="{{item.image.url}}" alt=""></a>
                <div class="card-body">
                    <a class="text-decoration-none text-dark text-center" href="{%url 'menu' item.name %}"><h3>{{item.name}}</h3></a>
                </div>
            </div>
        </div>
        {%endfor%}
    </div>
</div>
{%endblock%}
