{%extends 'base.html'%}
{%block content%}
<div class="container">
    <div class="row mt-5">
        <div class="col">
            <h3 class="text-center fw-bolder">USER LOGIN</h3>
            <hr>
        </div>
    </div>
    {%include 'message.html'%}
</div>
<div class="container">
    <div class="row justify-content-center my-4">
        <div class="col -12 col-sm-8 col-md-6 col-lg-4">
            <form action="" method="post" autocomplete="off">
                {%csrf_token%}
                <div class="mb-4">
                    <label for="" class="form-label">User Name</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter User Name">
                </div>
                <div class="mb-4">
                    <label for="" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter Your Password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="my-3">New User ? <a class="text-decoration-none" href="{%url 'register'%}">Register Now</a></p>
            </form>
        </div>
    </div>
    <hr>
</div>

{%endblock%}
